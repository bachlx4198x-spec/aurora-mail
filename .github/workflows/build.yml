name: Build Windows EXE

# Chạy tự động mỗi khi push lên nhánh main, hoặc bấm nút "Run workflow" thủ công
# trong tab Actions trên GitHub.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build portable .exe
        run: npm run build:win

      - name: Upload .exe as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-mail-windows
          path: dist/*.exe
          if-no-files-found: error
