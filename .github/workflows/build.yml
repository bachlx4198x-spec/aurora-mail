name: Build Windows EXE

# ── Khi nào workflow chạy ────────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]         # đổi thành "master" nếu repo bạn dùng nhánh master
    tags: [ "v*" ]                # push tag dạng v2.0.0 -> tự tạo GitHub Release
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:              # cho phép bấm nút "Run workflow" thủ công trên GitHub

permissions:
  contents: write                 # cần quyền này để job release có thể tạo Release + upload asset

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 1. Lấy code từ repo về máy ảo Windows của GitHub
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Cài Python (Đã bỏ phần kiểm tra cache requirements.txt bị lỗi)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cài thư viện chạy app + công cụ build (Đã chuyển sang cài trực tiếp psutil)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow psutil

      # 4. Sinh icon (assets/icon.ico) — NetScanPro.spec cần file này để build
      - name: Generate app icon
        run: python gen_icon.py

      # 5. Build EXE bằng PyInstaller theo cấu hình có sẵn trong NetScanPro.spec
      - name: Build EXE with PyInstaller
        run: pyinstaller --clean --noconfirm NetScanPro.spec

      # 6. Kiểm tra chắc chắn NetScanPro.exe đã được tạo ra
      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\NetScanPro\NetScanPro.exe")) {
            Write-Error "Khong tim thay dist\NetScanPro\NetScanPro.exe - build that bai!"
            exit 1
          }
          Write-Host "OK: dist\NetScanPro\NetScanPro.exe da duoc tao"
          Get-Item "dist\NetScanPro\NetScanPro.exe" | Select-Object Length

      # 7. Nén toàn bộ thư mục dist\NetScanPro thành 1 file zip để dễ tải/phân phối
      - name: Create distribution ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\NetScanPro\*" -DestinationPath "NetScanPro-v2.0-Windows-x64.zip" -Force

      # 8. Upload artifact — luôn chạy, kể cả push thường (không phải tag)
      #    Vào tab "Actions" của repo > chọn run > mục "Artifacts" để tải file .exe/.zip về
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetScanPro-Windows-x64
          path: NetScanPro-v2.0-Windows-x64.zip
          retention-days: 30

      # 9. (Tuỳ chọn, best-effort) Build thêm bộ cài đặt .exe bằng Inno Setup
      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: choco install innosetup -y

      # 10. Chạy build bộ cài đặt .exe nếu có file installer.iss
      - name: Build installer with Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      # 11. Tải bộ cài lên mục Artifacts
      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: NetScanPro-Installer
          path: Output/*.exe
          retention-days: 30

      # 12. Nếu push là 1 tag (vd: v2.0.0) -> tự tạo GitHub Release và đính kèm file zip
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NetScanPro-v2.0-Windows-x64.zip
            Output/*.exe
          generate_release_notes: true
